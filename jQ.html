<!DOCTYPE html>
<html>

<head>

    <title>Mobile Website</title>

    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet"
    href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery -->
    <script
    src="https://code.jquery.com/jquery-1.11.1.min.js">
    </script>

    <!-- jQuery Mobile -->
    <script
    src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js">
    </script>

</head>

<body>

<!-- HOME PAGE -->
<div data-role="page" id="home">

    <!-- Header -->
    <div data-role="header">

        <h1>My Mobile Site</h1>

    </div>

    <!-- Content -->
    <div data-role="content">

        <h3>Welcome to Mobile Website</h3>

        <p>
            This website is created using jQuery Mobile.
        </p>

        <!-- Buttons -->
        <a href="#about"
           data-role="button">

           About Page

        </a>

        <a href="#contact"
           data-role="button">

           Contact Page

        </a>

    </div>

    <!-- Footer -->
    <div data-role="footer">

        <h4>Footer Section</h4>

    </div>

</div>


<!-- ABOUT PAGE -->
<div data-role="page" id="about">

    <div data-role="header">

        <h1>About</h1>

    </div>

    <div data-role="content">

        <p>
            This is About Page.
        </p>

        <a href="#home"
           data-role="button">

           Go Home

        </a>

    </div>

</div>





<!-- CONTACT PAGE -->
<div data-role="page" id="contact">

    <div data-role="header">

        <h1>Contact</h1>

    </div>

    <div data-role="content">

        <form>

            <label>Name:</label>

            <input type="text">

            <label>Email:</label>

            <input type="email">

            <button>

                Submit

            </button>

        </form>

        <a href="#home"
           data-role="button">

           Go Home

        </a>

    </div>

</div>

</body>
</html>
